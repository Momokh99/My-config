# #######################################################################################
# KEYBINDINGS
# #######################################################################################

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$browser = zen-browser
$editor = nvim

###################
### MAIN BINDINGS ###
###################

# Terminal
bind = $mainMod, Return, exec, $terminal

# File Explorer
bind = $mainMod, E, exec, $fileManager

# Browser
bind = $mainMod, Z, exec, $browser
bind = $mainMod, F, exec, firefox

# Editor
bind = $mainMod, N, exec, kitty $editor
bind = $mainMod, O, exec, kitty opencode
# Menu / App Launcher
bind = $mainMod, space, exec, wofi --show drun

#wifi 
bind = $mainMod, I,exec, kitty --class impala -e impala

windowrule{
  name =impala_rules
  match:class=^(impala)$
  float=on
  center=on
  size=600 550
}
# Kill / Delete active window
bind = $mainMod, W, killactive,

# Exit Hyprland
bind = $mainMod SHIFT, Q, exit,

###################
### WINDOW FOCUS ###
###################

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

###################
### WINDOW ACTIONS ###
###################

# Fullscreen
bind = ALT, F, fullscreen, 0

# Pseudo-tiling
bind = $mainMod, P, pseudo,

# Toggle floating
bind = ALT, V, togglefloating,

# Toggle split
bind = $mainMod, J, togglesplit,

###################
### WORKSPACES 1-9 ###
###################

# Switch to workspace (AZERTY)
bind = ALT, ampersand, workspace, 1
bind = ALT, eacute, workspace, 2
bind = ALT, quotedbl, workspace, 3
bind = ALT, apostrophe, workspace, 4
bind = ALT, parenleft, workspace, 5
bind = ALT, minus, workspace, 6
bind = ALT, egrave, workspace, 7
bind = ALT, underscore, workspace, 8
bind = ALT, ccedilla, workspace, 9

# Move window to workspace (AZERTY)
bind = ALT SHIFT, ampersand, movetoworkspace, 1
bind = ALT SHIFT, eacute, movetoworkspace, 2
bind = ALT SHIFT, quotedbl, movetoworkspace, 3
bind = ALT SHIFT, apostrophe, movetoworkspace, 4
bind = ALT SHIFT, parenleft, movetoworkspace, 5
bind = ALT SHIFT, minus, movetoworkspace, 6
bind = ALT SHIFT, egrave, movetoworkspace, 7
bind = ALT SHIFT, underscore, movetoworkspace, 8
bind = ALT SHIFT, ccedilla, movetoworkspace, 9

# Scroll through workspaces
bind = $mainMod, Prior, workspace, e+1
bind = $mainMod, Next, workspace, e-1

###################
### SPECIAL WORKSPACE ###
###################

bind = $mainMod, B, togglespecialworkspace, browser
bind = $mainMod SHIFT, B, movetoworkspace, special:browser
windowrule = match:class ^(zen)$,fullscreen 0

###################
### WINDOW MOVEMENT ###
###################

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###################
### SCREENSHOTS (grim + slurp) ###
###################

# Full screen
bind = , Print, exec, grim

# Select region
bind = $mainMod, Print, exec, grim -g "$(slurp)"

# Active window
bind = $mainMod ALT, Print, exec, grim -g "$(slurp -r)" - | wl-copy

# Screenshot to file
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

###################
### MEDIA KEYS ###
###################

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media controls
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

###################
### SYSTEM ###
###################

# Power menu
bind = $mainMod SHIFT, E, exec, wlogout

# Reload Hyprland
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Lock screen
bind = $mainMod SHIFT, L, exec, swaylock -f
