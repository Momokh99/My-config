# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# Source keybinds
source = ~/.config/hypr/keybinds.conf

# ################
# ### MONITORS ###
# ################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = , preferred, auto, 1.5

# ################
# ### MY PROGRAMS ###
# ################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun
$browser = zen-browser

# #################
# ### AUTOSTART ###
# #################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
exec-once = waybar
# exec-once = dunst

# #############################
# ### ENVIRONMENT VARIABLES ###
# #############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland

# #####################
# ### LOOK AND FEEL ###
# #####################

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = 0x99f2ff
    col.inactive_border = 0x1e3a8a

    resize_on_border = true

    allow_tearing = false

    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.7

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(111827ee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes

    bezier = smoothIn, 0.5, 0, 1, 0.5
    bezier = smoothOut, 0, 0.5, 0.5, 1

    animation = windows, 1, 4, smoothOut
    animation = fade, 1, 6, default
    animation = workspaces, 1, 4, smoothIn, slide
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# 5 Workspaces
workspace = 1, persistent:true, default:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

# #############
# ### INPUT ###
# #############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = fr
    kb_variant = oss
    kb_options = grp:win_space_toggle

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = false
# }
