# --- CONFIGURATION & FONTS ---
# Recommended fonts: "JetBrainsMono Nerd Font", "FiraCode Nerd Font", or "Inter"
$font = JetBrainsMono Nerd Font

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 4, linear
    animation = fadeOut, 1, 4, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
}

# --- PASSWORD INPUT ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    inner_color = rgba(15, 15, 15, 0.6) # Dark semi-transparent background
    
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(242, 242, 242)
    fade_on_empty = false
    rounding = 10

    font_family = $font
    placeholder_text = <i>Input Password...</i>
    fail_text = <i>$PAMFAIL ($ATTEMPTS)</i>
    
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true

    position = 0, -40
    halign = center
    valign = center
}

# --- DIGITAL CLOCK (Centered) ---
label {
    monitor =
    text = $TIME
    font_size = 95
    font_family = $font
    font_weight = bold
    font_color = rgb(242, 242, 242)

    position = 0, 150         # Centered horizontally, pushed up 150px
    halign = center
    valign = center
}

# --- CALENDAR DATE (Centered) ---
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = $font
    font_color = rgba(242, 242, 242, 0.7)

    position = 0, 60          # Centered horizontally, sits right below the time
    halign = center
    valign = center
}

# --- KEYBOARD LAYOUT BUTTON ---
label {
    monitor =
    # Displays layout with a keyboard icon. e.g., "󰌌  EN" or "󰌌  RU"
    text = 󰌌  $LAYOUT[en,fr,ru]
    font_size = 14
    font_family = $font
    font_color = rgb(242, 242, 242)
    
    # Optional styling to make it look like a button badge
    # background_color = rgba(15, 15, 15, 0.6)
    # rounding = 5
    
    # Left click switches to the next layout globally
    onclick = hyprctl switchxkblayout all next

    position = 0, -110
    halign = center
    valign = center
}
