# #######################################################################################
# WINDOW RULES
# #######################################################################################

# Ignore maximize requests
# windowrule = suppressevent maximize, class:.*

# Fix XWayland dragging issues
# windowrule = nofocus, xwayland:1, floating:1

# Float utility windows
# windowrule = float, class:^(pavucontrol)$
# windowrule = float, class:^(blueman-manager)$
# windowrule = float, class:^(nm-connection-editor)$
# windowrule = float, class:^(yad)$
# windowrule = float, class:^(qt5ct)$
# windowrule = float, class:^(qt6ct)$
# windowrule = float, class:^(Lxappearance)$
# windowrule = float, title:^(File Transfer)$

# Picture-in-Picture
# windowrule = float, title:^(Picture-in-Picture)$

# Waybar (transparent)
# windowrule = opacity 0.0 0.0, class:^(waybar)$

# Notifications
# windowrule = opacity 0.95 0.95, class:^(dunst)$

# Rofi / Wofi
# windowrule = opacity 0.9 0.9, class:^(rofi)$
# windowrule = opacity 0.9 0.9, class:^(wofi)$
# windowrule = opacity 0.9 0.9, class:^(ulauncher)$
